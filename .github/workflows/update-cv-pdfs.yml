name: Build and Update CV PDFs

on:
  push:
    branches: [main, master]
    paths:
      - "CV_Frederik/**"
      - "CV_Frederik_english/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-cv-pdfs:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Danish CV PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: CV_Dansk.tex
          working_directory: CV_Frederik

      - name: Build English CV PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: CV_English.tex
          working_directory: CV_Frederik_english

      - name: Copy PDFs to website folder
        run: |
          mkdir -p CVs
          cp CV_Frederik/CV_Dansk.pdf CVs/CV_Dansk.pdf
          cp CV_Frederik_english/CV_English.pdf CVs/CV_English.pdf

      - name: Commit updated PDFs
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(cv): update generated PDFs [skip ci]"
          file_pattern: "CVs/CV_Dansk.pdf CVs/CV_English.pdf"
